<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Certificate Manager</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body class="dark auth-body">

  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="auth-logo">
        <i class="fa-solid fa-key"></i>
        <h1>CertiManager</h1>
      </div>

      <div class="auth-header">
        <h2>Reset Password</h2>
        <p>Set a new password for your account.</p>
      </div>

      <form id="reset-password-form" novalidate>
        <!-- New Password -->
        <div class="form-group">
          <label for="reset-new-password">New Password</label>
          <div class="auth-input-wrapper">
            <input type="password" id="reset-new-password" name="newPassword" class="form-control" placeholder="••••••••">
            <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('reset-new-password')">
              <i class="fa-solid fa-eye-slash"></i>
            </button>
          </div>
          <span class="error-msg" id="error-reset-new-password"></span>
        </div>

        <!-- Confirm New Password -->
        <div class="form-group">
          <label for="reset-confirm-password">Confirm Password</label>
          <div class="auth-input-wrapper">
            <input type="password" id="reset-confirm-password" name="confirmPassword" class="form-control" placeholder="••••••••">
            <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('reset-confirm-password')">
              <i class="fa-solid fa-eye-slash"></i>
            </button>
          </div>
          <span class="error-msg" id="error-reset-confirm-password"></span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-block btn-auth" id="reset-submit-btn">
          <span class="btn-text">Update Password</span>
          <span class="spinner" style="display: none;"><i class="fa-solid fa-circle-notch"></i></span>
        </button>

        <div class="auth-footer-links">
          <p><a href="login.html">Back to Sign In</a></p>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/reset-password.js"></script>
</body>

</html>
