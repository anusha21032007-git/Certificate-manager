<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Certificate - Certificate Manager</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/add-certificate.css">
  <style>
    .mobile-page-content {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 16px 20px 40px;
    }
  </style>
</head>

<body class="dark">

  <!-- Left Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-graduation-cap"></i>
      <h1>CertiManager</h1>
    </div>
    <ul class="sidebar-menu">
      <li class="sidebar-menu-item" id="menu-item-certs">
        <a href="index.html" id="certificates-menu-btn">
          <i class="fa-solid fa-cubes"></i>
          <span>Certificates</span>
        </a>
      </li>
      <li class="sidebar-menu-item" id="menu-item-favs">
        <a href="index.html?filter=favorites" id="favorites-menu-btn">
          <i class="fa-solid fa-star"></i>
          <span>Favourites</span>
        </a>
      </li>
      <li class="sidebar-menu-item" id="menu-item-profile">
        <a href="profile.html" id="profile-menu-btn">
          <i class="fa-solid fa-user"></i>
          <span>Profile</span>
        </a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <li class="sidebar-menu-item" style="list-style: none;">
        <a href="#" id="logout-btn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span>
        </a>
      </li>
    </div>
  </aside>

  <!-- Top Navigation Bar -->
  <header class="header" style="padding: 0 16px;">
    <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
      <a href="index.html" class="header-btn" title="Back to Dashboard" style="text-decoration: none; flex-shrink: 0;">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <h1 class="header-title" style="font-size: 18px; font-weight: 700; color: var(--text-main); margin: 0; line-height: 1;">
        Add Certificate
      </h1>
    </div>
    <div class="profile-trigger" id="profile-header-trigger" title="View Profile">
      <img src="images/profile.png" alt="User Avatar">
    </div>
  </header>

  <!-- Main Content Wrapper -->
  <main class="layout-wrapper fade-in-section">
    <div class="mobile-page-content">
      <div class="form-header" style="margin-bottom: 24px;">
        <p style="color: var(--text-muted); font-size: 14px;">Enter the details of your achievement to save it to your dashboard.</p>
      </div>

      <form id="add-certificate-form" novalidate>
        <!-- Title -->
        <div class="form-group">
          <label for="cert-title">Certificate Title <span class="required">*</span></label>
          <input type="text" id="cert-title" name="title" class="form-control"
            placeholder="e.g. AWS Certified Solutions Architect">
          <span class="error-msg" id="error-title"></span>
        </div>

        <!-- Org & Category Grid -->
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="cert-org">Issuing Organization <span class="required">*</span></label>
            <input type="text" id="cert-org" name="org" class="form-control" placeholder="e.g. Amazon Web Services">
            <span class="error-msg" id="error-org"></span>
          </div>
          <div class="form-group flex-1">
            <label for="cert-category">Category <span class="required">*</span></label>
            <input type="text" id="cert-category" name="category" class="form-control" placeholder="e.g. Workshop, Internship, Hackathon...">
            <span class="error-msg" id="error-category"></span>
          </div>
        </div>

        <!-- Date & Verification URL -->
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="cert-date">Issued Date</label>
            <input type="date" id="cert-date" name="date" class="form-control">
            <span class="error-msg" id="error-date"></span>
          </div>
          <div class="form-group flex-1">
            <label for="cert-url">Verification URL</label>
            <input type="url" id="cert-url" name="url" class="form-control"
              placeholder="e.g. https://aws.amazon.com/verify/id">
            <span class="error-msg" id="error-url"></span>
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="cert-description">Description</label>
          <textarea id="cert-description" name="description" class="form-control" rows="3"
            placeholder="Briefly describe the skills or credentials earned..."></textarea>
        </div>

        <!-- File Upload Zone -->
        <div class="form-group">
          <label>Upload Certificate File <span class="required">*</span></label>
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="cert-file" name="file" accept="image/*,.pdf" style="display: none;">
            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
            <span class="upload-text">Drag & drop your file here or <span class="browse-btn">Browse</span></span>
            <span class="upload-subtext">Supports PNG, JPG, or PDF (Max 5MB)</span>
            <div class="file-info-preview" id="file-info-preview" style="display: none;">
              <i class="fa-regular fa-file-pdf file-icon" id="preview-icon"></i>
              <span id="preview-filename">certificate.pdf</span>
              <button type="button" class="remove-file-btn" id="remove-file-btn" title="Remove file">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
          </div>
          <span class="error-msg" id="error-file"></span>
        </div>

        <!-- Action Buttons -->
        <div class="form-actions" style="margin-top: 24px;">
          <a href="index.html" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save Certificate</button>
        </div>
      </form>
    </div>
  </main>

  <!-- Theme and Helper Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/add-certificate.js"></script>
</body>

</html>
