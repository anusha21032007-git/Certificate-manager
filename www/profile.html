<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Certificate Manager</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/profile.css">
  <style>
    .mobile-page-content {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 16px 20px 40px;
    }
  </style>
</head>

<body class="dark">

  <!-- Left Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-graduation-cap"></i>
      <h1>CertiManager</h1>
    </div>
    <ul class="sidebar-menu">
      <li class="sidebar-menu-item" id="menu-item-certs">
        <a href="index.html" id="certificates-menu-btn">
          <i class="fa-solid fa-cubes"></i>
          <span>Certificates</span>
        </a>
      </li>
      <li class="sidebar-menu-item" id="menu-item-favs">
        <a href="index.html?filter=favorites" id="favorites-menu-btn">
          <i class="fa-solid fa-star"></i>
          <span>Favourites</span>
        </a>
      </li>
      <li class="sidebar-menu-item active" id="menu-item-profile">
        <a href="profile.html" id="profile-menu-btn">
          <i class="fa-solid fa-user"></i>
          <span>Profile</span>
        </a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <li class="sidebar-menu-item" style="list-style: none;">
        <a href="#" id="logout-btn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span>
        </a>
      </li>
    </div>
  </aside>

  <!-- Top Navigation Bar -->
  <header class="header" style="padding: 0 16px;">
    <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
      <a href="index.html" class="header-btn" title="Back to Dashboard" style="text-decoration: none; flex-shrink: 0;">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <h1 class="header-title" style="font-size: 18px; font-weight: 700; color: var(--text-main); margin: 0; line-height: 1;">
        Profile
      </h1>
    </div>

  </header>

  <!-- Main Content Wrapper -->
  <main class="layout-wrapper fade-in-section">
    <div class="mobile-page-content">
      <!-- Main Profile Center Section -->
      <div class="profile-main-info" style="margin-bottom: 24px;">
        <div class="profile-avatar-container">
          <img src="images/profile.png" alt="Profile Picture" id="profile-avatar-img">
          <div class="avatar-overlay" title="Upload new photo">
            <i class="fa-solid fa-pen"></i>
          </div>
          <input type="file" id="profile-avatar-input" accept="image/*" style="display: none;">
        </div>
        <h2 id="display-fullname">User</h2>
        <p id="display-username">@user</p>
      </div>

      <!-- Profile Form -->
      <form id="profile-details-form" class="profile-form">
        <!-- Basic Info Fields -->
        <div class="form-section-title" style="display: flex; justify-content: space-between; align-items: center;">
          <span>Personal Information</span>
          <button class="edit-profile-btn" id="edit-profile-trigger" type="button" title="Edit Profile Details"
            style="width: 28px; height: 28px; font-size: 12px; margin-bottom: 4px;">
            <i class="fa-solid fa-pen"></i>
          </button>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label for="profile-username">Username</label>
            <input type="text" id="profile-username" class="form-control" value="" disabled>
          </div>
          <div class="form-group flex-1">
            <label for="profile-fullname-input">Full Name</label>
            <input type="text" id="profile-fullname-input" class="form-control" value="" disabled>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label for="profile-email">Email Address</label>
            <input type="email" id="profile-email" class="form-control" value="" disabled>
          </div>
        </div>

        <div class="form-group">
          <label for="profile-bio">Bio</label>
          <textarea id="profile-bio" class="form-control" rows="2"
            disabled placeholder="Certified Software Engineer | Lifelong Learner..."></textarea>
        </div>

        <!-- Change Password Section -->
        <div class="form-section-title" style="margin-top: 32px;">Change Password</div>

        <div class="form-group">
          <label for="current-password">Current Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="current-password" class="form-control" placeholder="••••••••">
            <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('current-password')">
              <i class="fa-solid fa-eye-slash"></i>
            </button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label for="new-password">New Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="new-password" class="form-control" placeholder="Enter new password">
              <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('new-password')">
                <i class="fa-solid fa-eye-slash"></i>
              </button>
            </div>
          </div>
          <div class="form-group flex-1">
            <label for="confirm-password">Confirm Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="confirm-password" class="form-control" placeholder="Confirm new password">
              <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('confirm-password')">
                <i class="fa-solid fa-eye-slash"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Save Button -->
        <div class="form-actions" style="margin-top: 24px;">
          <button type="submit" class="btn btn-primary" id="save-profile-btn" style="width: 100%;">
            <i class="fa-solid fa-check"></i> Save Profile & Password
          </button>
        </div>
      </form>
    </div>
  </main>

  <!-- Theme and Helper Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/profile.js"></script>
</body>

</html>
